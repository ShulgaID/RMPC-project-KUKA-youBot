# =============================================================================
#  mission_params.yaml — ЕДИНЫЙ файл всех важных параметров задачи youBot.
# -----------------------------------------------------------------------------
#  ЭТО ЕДИНСТВЕННОЕ МЕСТО, которое нужно править, чтобы поменять поведение
#  задачи. Файл загружается в launch-файлах (pick_place_sim.launch и
#  pick_place_real.launch) и раздаётся всем нодам: room_generator,
#  spawn_task_objects, cube_detector, pick_place_mission.
#
#  Меняете значение ЗДЕСЬ -> оно подхватывается везде, код трогать не нужно.
#
#  Группы ниже:
#    room          — геометрия комнаты, сетка, seed
#    points        — ячейки точек интереса A/B/C
#    obstacles     — препятствия: радиус, разброс, частота
#    robot         — габарит робота и зазоры (едины для всех нод!)
#    cube          — цвет кубика и запасной цвет
#    mission       — скорости, допуски, попытки детекции
# =============================================================================

# ----------------------------------------------------------------------------
# КОМНАТА (геометрия и сетка)
# ----------------------------------------------------------------------------
room:
  width:  2.0        # размер комнаты вдоль X (м)
  height: 2.0        # размер комнаты вдоль Y (м)
  origin_x: 0.0      # левый-нижний угол комнаты в кадре odom
  origin_y: 0.0
  cell_size: 0.5     # желаемый размер ячейки сетки (м)
  wall_thickness: 0.10
  wall_height: 0.50
  frame_id: "odom"
  seed: 67           # зерно ГСЧ -> воспроизводимая расстановка препятствий

# ----------------------------------------------------------------------------
# ТОЧКИ ИНТЕРЕСА (ячейки сетки "col,row"; пусто => авто).
#   A — парковка/home, B — кубик/pick, C — склад/place.
#   По умолчанию B в левом верхнем углу (0,4) для комнаты 5x5.
# ----------------------------------------------------------------------------
points:
  cell_A: "0,0"      # парковка (ближний угол у origin)
  cell_B: "0,3"      # кубик (дальний угол по Y)
  cell_C: "3,3"      # склад (противоположный дальний угол)

# ----------------------------------------------------------------------------
# ПРЕПЯТСТВИЯ (виртуальные цилиндры)
#   radius_min == radius_max  => фиксированный радиус (сейчас 0.1).
#   Чтобы вернуть разброс радиуса — задайте разные min/max.
#   spread       — насколько центр цилиндра может отклоняться от центра ячейки
#                  (доля половины ячейки: 0 = строго в центре, 1 = до края с
#                   учётом зазора). Управляет "разбросом от центра".
#   max_per_cell — максимум цилиндров в одной ячейке (частота появления).
# ----------------------------------------------------------------------------
obstacles:
  radius_min: 0.1    # фиксированный радиус препятствия (м)
  radius_max: 0.1
  spread: 0.6        # разброс центра внутри ячейки (0..1)
  max_per_cell: 1    # частота: 0..max цилиндров на ячейку

# ----------------------------------------------------------------------------
# РОБОТ (единый габарит для room_generator / mission / планировщика!)
#   robot_radius — ВПИСАННЫЙ радиус youBot (~0.30 м).
#   clearance/safety_margin — запас между корпусом и препятствием.
# ----------------------------------------------------------------------------
robot:
  robot_radius: 0.20
  clearance: 0.10        # зазор для гарантии проходимости (room_generator)
  safety_margin: 0.0   # запас инфляции для планировщика (mission)

# ----------------------------------------------------------------------------
# КУБИК
#   color          — фиксированный цвет ('' => случайный, выбирается по seed).
#   fallback_color — запасной цвет, если детекция не удалась за все попытки.
# ----------------------------------------------------------------------------
cube:
  color: "red"              # '', 'red', 'green' или 'blue'
  fallback_color: "green"

# ----------------------------------------------------------------------------
# МИССИЯ (движение, допуски, детекция)
# ----------------------------------------------------------------------------
mission:
  rate: 20               # частота управляющего цикла (Гц)
  v_max: 0.22            # макс. линейная скорость базы (м/с)
  w_max: 1.0             # макс. угловая скорость (рад/с)
  v_creep: 0.05          # скорость аккуратного доезда к кубику (м/с)
  pos_tol: 0.06          # допуск по позиции (м)
  yaw_tol: 0.10          # допуск по курсу (рад)
  view_dist: 0.73        # дистанция осмотра кубика камерой (м)
  arm_reach: 0.523       # вылет руки вперёд (м)
  approach_gap: 0.25     # доп. зазор на этапе подъезда к захвату (м)
  color_attempts: 1      # сколько попыток детекции цвета перед fallback
