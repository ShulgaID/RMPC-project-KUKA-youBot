# ВНИМАНИЕ: EthernetDevice ДОЛЖЕН совпадать с реальным именем проводного
# интерфейса к роботу (ip link). На современных Ubuntu это НЕ eth0,
# а например enp2s0 / eno1. Неверное имя => "No socket connection".
# Подробности и решение: docs/ETHERCAT_TROUBLESHOOTING.md
EthernetDevice = eth0
CycleTime = 1000
EtherCATTimeout_[usec] = 500
MailboxTimeout_[usec] = 20000
